name: Sync knockout teams

on:
  schedule:
    # Every 3 hours during the tournament (UTC)
    - cron: "0 6,9,12,15,18,21,0,3 * 6-7 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Update knockout matchups from ESPN
        run: node scripts/update-from-espn.mjs

      - name: Rebuild site
        run: node scripts/build.mjs

      - name: Commit if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync knockout teams from ESPN"
          file_pattern: "data/*.json index.html"
